<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebForWork - Kezdőlap</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            padding-top: 8vh;
        }

        .header-titles {
            text-align: center;
            margin-bottom: 8vh;
        }

        .header-titles h1 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-titles h3 {
            font-size: 1.5rem;
            margin: 0;
            color: #888;
            font-weight: 400;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 75%;
            max-width: 1000px;
        }

        .btn {
            text-decoration: none;
            padding: 50px 20px;
            font-size: 2.5rem;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: translateY(-8px);
        }

        .btn-boss {
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
        }
        .btn-boss:hover {
            box-shadow: 0 15px 35px rgba(78, 67, 118, 0.7);
        }

        .btn-edit {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }
        .btn-edit:hover {
            box-shadow: 0 15px 35px rgba(253, 160, 133, 0.7);
        }

        /* --- FELUGRÓ ABLAK (MODAL) DIZÁJN --- */
        .modal-overlay {
            display: none; /* Alapból rejtve van */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Félig átlátszó fekete háttér */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid #333;
        }

        .modal-box h2 {
            margin-top: 0;
            color: #fda085;
        }

        .modal-box input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            border: none;
            background-color: #2a2a2a;
            color: white;
            font-size: 1.2rem;
            box-sizing: border-box;
            outline: none;
        }

        .modal-box input:focus {
            border: 2px solid #fda085;
            background-color: #333;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-btn-cancel {
            background-color: #444;
            color: white;
        }
        .modal-btn-cancel:hover { background-color: #555; }

        .modal-btn-submit {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: white;
        }
        .modal-btn-submit:hover { filter: brightness(1.1); }

        #errorMessage {
            color: #ff4d4d;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-titles">
        <h1>WebForWork</h1>
        <h3>Made by: Mark Miller</h3>
    </div>

    <div class="button-container">
        <a href="app.html?role=boss" class="btn btn-boss">Főnök nézet</a>
        <button onclick="openModal()" class="btn btn-edit">Szerkesztői nézet</button>
    </div>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal-box">
            <h2>Szerkesztői azonosítás</h2>
            <p>Kérlek, add meg a jelszót a belépéshez!</p>
            
            <input type="password" id="pwdInput" placeholder="Jelszó..." onkeypress="handleEnter(event)">
            
            <div class="modal-buttons">
                <button onclick="closeModal()" class="modal-btn modal-btn-cancel">Mégse</button>
                <button onclick="checkPassword()" class="modal-btn modal-btn-submit">Belépés</button>
            </div>
            
            <p id="errorMessage">Hibás jelszó! Próbáld újra.</p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("passwordModal");
        const pwdInput = document.getElementById("pwdInput");
        const errorMsg = document.getElementById("errorMessage");

        // Ablak megnyitása
        function openModal() {
            modal.style.display = "flex";
            pwdInput.value = ""; // Kiüríti az előzőleg beírt jelszót
            errorMsg.style.display = "none"; // Eltünteti a hibaüzenetet
            setTimeout(() => pwdInput.focus(), 100); // Automatikusan a beviteli mezőre ugrik
        }

        // Ablak bezárása
        function closeModal() {
            modal.style.display = "none";
        }

        // Jelszó ellenőrzése
        function checkPassword() {
            if (pwdInput.value === "szerkesztes22") {
                window.location.href = "app.html?role=edit";
            } else {
                errorMsg.style.display = "block"; // Megjeleníti a piros hibaüzenetet
                pwdInput.value = ""; // Törli a rossz jelszót
                pwdInput.focus();
            }
        }

        // Ha entert nyom a jelszó mezőben, az olyan mintha a Belépés gombra kattintana
        function handleEnter(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        }
    </script>

</body>
</html>
